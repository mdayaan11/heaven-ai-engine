services:
  - type: web
    name: heaven-ai-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: REDIS_URL
        sync: false
      - key: E2B_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://heavenaii.netlify.app,http://localhost:3000
